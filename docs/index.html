<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SolarEdge Monitor</title>
</head>
<body>
<h1>SolarEdge Production Monitor</h1>
<div id="summary">Loading...</div>
<script>
fetch('../data/dashboard.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('summary').innerHTML =
      `Records collected: ${data.count}`;
  });
</script>
</body>
</html>
