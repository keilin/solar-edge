<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SolarEdge Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>SolarEdge Production Monitor</h1>

<h2>Summary</h2>

<div id="summary"></div>

<h2>Annual Production</h2>
<canvas id="annual"></canvas>

<h2>Specific Yield (kWh/kWp)</h2>
<canvas id="yield"></canvas>

<h2>Anomalies</h2>
<div id="alerts"></div>


<script>

fetch("dashboard.json")
.then(r => r.json())
.then(data => {

const annual = data.annual;

document.getElementById("summary").innerHTML =
`
Records: ${data.count}<br>
Lifetime production:
${Object.values(annual)
.reduce((a,b)=>a+Number(b),0)
.toFixed(0)} kWh
`;


new Chart(
document.getElementById("annual"),
{
type:"bar",
data:{
labels:Object.keys(annual),
datasets:[
{
label:"kWh",
data:Object.values(annual)
}
]
}
});


new Chart(
document.getElementById("yield"),
{
type:"line",
data:{
labels:Object.keys(data.yield),
datasets:[
{
label:"kWh/kWp",
data:Object.values(data.yield)
}
]
}
});


document.getElementById("alerts").innerHTML =
data.anomalies.length
?
JSON.stringify(data.anomalies)
:
"No anomalies detected";

});

</script>

</body>
</html>
